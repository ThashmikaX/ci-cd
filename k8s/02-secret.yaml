# ponytail: plain Secret (base64, not encrypted) is fine for a coursework
# single-node cluster. Swap for sealed-secrets/External Secrets if this ever
# targets a real multi-tenant cluster.
apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
  namespace: taskforge
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: root
  MONGO_INITDB_ROOT_PASSWORD: changeme
  MONGO_URI: mongodb://root:changeme@mongo:27017/taskforge?authSource=admin
