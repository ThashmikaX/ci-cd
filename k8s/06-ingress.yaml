apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskforge
  namespace: taskforge
spec:
  ingressClassName: traefik # k3s's built-in ingress controller
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
