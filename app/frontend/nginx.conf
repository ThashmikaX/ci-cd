server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  # Only exercised in docker-compose (no ingress there). In Kubernetes the
  # Ingress routes /api straight to the backend Service, bypassing this.
  location /api/ {
    proxy_pass http://backend:4000/api/;
  }
}
